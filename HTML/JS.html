<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Script</title>

    <style>
        * {
            background-color: black;
            color: white;
        }

        .DOMBox {
            height: 50px;
            width: 50px;
            border: 2px solid white;
            margin: 2px;
        }

        .Box {
            height: 50px;
            width: 50px;
            border: 2px solid white;
            margin: 2px;
        }
        .Box_1 {
            height: 50px;
            width: 50px;
            border: 2px solid white;
            margin: 2px;
        }

        .EventChild {
            background-color: white;
            color: black;
            padding: 10px;
            margin: 3px;
        }

        .EventChildContainer {
            background-color: blue;
            color: black;
            padding: 5px;
        }

        .EventContainer {
            background-color: yellow;
            color: black;
            padding: 10px;
        }
    </style>

</head>

<body>
    <button>Submit</button>

    <div class="DOMContainer">
        <div class="DOMBox">Box 1</div>
        <div class="DOMBox">Box 2</div>
        <div class="DOMBox">Box 3</div>
        <div class="DOMBox">Box 4</div>
        <div class="DOMBox">Box 5</div>
    </div>

    <div class="table">
        <table >
            <tr>
                <th>Name</th>
                <th>City</th>
            </tr>
            <tr>
                <td>John</td>
                <td>New York</td>
            </tr>
            <tr>
                <td>Jane</td>
                <td>Los Angeles</td>
            </tr>
        </table>
    </div>
    <div>
        <div class="Box" data-conceptby="akshat">Box'1</div>
        <div class="Box">Box'2</div>
        <div class="Box" id="bluebox" >Box'3</div>
    </div>

    <div>
        <div class="Box_1">'Box'1</div>
        <div class="Box_1">'Box'2</div>
        <div class="Box_1" id="bluebox" >'Box'3</div>
    </div>

    <div class="EventBtn">
        <div class="eventbox">Hey I am a box</div>
        <button id="btn">Change content</button>
    </div>

    <div class="EventContainer">
        <section class="EventChildContainer">
            <div class="EventChild">
                I am an Event Child
            </div>
        </section>
    </div>

    <script>
        // alert("Hello World");
    </script>
    <!--This is how you can use JS on frontend-->

    <script src="scriptjs.js"></script>
</body>

</html>
